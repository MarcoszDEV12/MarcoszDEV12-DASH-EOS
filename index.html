<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EOS-BR | Passagem de Turno Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --shopee-orange: #EE4D2D;
      --shopee-bg: #f0f2f5;
      --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }
 
    body {
      background-color: var(--shopee-bg);
      font-family: 'Archivo', sans-serif;
      color: #333;
    }

    .shopee-header {
      background: linear-gradient(135deg, #ee4d2d, #ff7337);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(238, 77, 45, 0.2);
    }

    .card-master {
      background: white;
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      margin-bottom: 24px;
      padding: 24px;
      border: 1px solid #edf2f7;
      transition: all 0.3s ease;
    }

    .section-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--shopee-orange);
      border-left: 5px solid var(--shopee-orange);
      padding-left: 12px;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-premium {
      height: 48px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 0 14px;
      width: 100%;
      transition: all 0.3s;
      font-size: 14px;
      font-weight: 600;
      background: #f8fafc;
    }

    .input-premium:focus {
      border-color: var(--shopee-orange);
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(238, 77, 45, 0.1);
    }

    .btn-toggle {
      height: 48px;
      flex: 1;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-weight: 700;
      background: #fff;
      color: #64748b;
      transition: all 0.2s;
    }

    .active-sim { background: #10b981 !important; color: white !important; border-color: #10b981 !important; }
    .active-nao { background: #ee4d2d !important; color: white !important; border-color: #ee4d2d !important; }

    .btn-send {
      background: linear-gradient(90deg, #ee4d2d, #ff7337);
      color: white;
      font-weight: 800;
      text-transform: uppercase;
      transition: all 0.3s;
      box-shadow: 0 10px 20px rgba(238, 77, 45, 0.3);
    }

    .grid-row-item { display: grid; gap: 16px; align-items: end; padding: 16px 0; border-bottom: 1px solid #f1f5f9; grid-template-columns: 1.5fr 1fr 1fr 2fr; }
    .grid-row-dmo { display: grid; gap: 16px; align-items: end; padding: 16px 0; border-bottom: 1px solid #f1f5f9; grid-template-columns: 1.5fr 0.8fr 0.8fr 0.8fr 2fr; }
    .grid-row-compact { display: grid; gap: 16px; align-items: end; padding: 16px 0; border-bottom: 1px solid #f1f5f9; grid-template-columns: 1.5fr 1fr 2fr; }
    .grid-row-idle { display: grid; gap: 16px; align-items: end; padding: 16px 0; border-bottom: 1px solid #f1f5f9; grid-template-columns: 1.2fr 1fr 0.8fr 1.5fr 1fr; }
 
    @media (max-width: 768px) {
      .grid-row-item, .grid-row-dmo, .grid-row-compact, .grid-row-idle { grid-template-columns: 1fr !important; }
    }

    #success-modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
    }

    .spinner { display: none; width: 22px; height: 22px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="shopee-header shadow-md sticky top-0 z-50">
    <div class="flex items-center gap-4">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Shopee.svg" alt="Shopee" class="h-9 brightness-0 invert">
      <div class="text-white border-l-2 border-white/30 pl-4">
        <h1 class="text-2xl font-black tracking-tighter">EOS-BR</h1>
        <p class="text-[11px] font-bold uppercase opacity-90 tracking-widest">PASSAGEM DE TURNO</p>
      </div>
    </div>
    <div id="clock" class="bg-black/20 text-white px-5 py-2 rounded-full text-sm font-bold border border-white/20 backdrop-blur-sm">00:00:00</div>
  </header>

  <main class="max-w-6xl mx-auto p-4 md:p-10">
    <form id="eosForm">
      <div class="card-master">
        <div class="section-title">Informações de Identificação</div>
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
          <div>
            <label class="text-[11px] font-black text-gray-400 mb-2 block uppercase">CD Operacional</label>
            <select name="cd_operacional" class="input-premium" required>
              <option value="">Selecione...</option>
              <option value="JABOATAO">Jaboatão</option>
              <option value="FRANCO 1">Franco 1</option>
              <option value="FRANCO 2">Franco 2</option>
              <option value="CONTAGEM">Contagem</option>
              <option value="NOVA SANTA RITA">Nova Santa Rita</option>
              <option value="HIDROLÂNDIA">Hidrolândia</option>
            </select>
          </div>
          <div>
            <label class="text-[11px] font-black text-gray-400 mb-2 block uppercase">Responsável</label>
            <input type="text" name="responsavel" class="input-premium" placeholder="Nome" required>
          </div>
          <div>
            <label class="text-[11px] font-black text-gray-400 mb-2 block uppercase">Cargo</label>
            <select name="cargo" class="input-premium" required>
              <option value="">Selecione</option>
              <option value="TEAM LEADER">TEAM LEADER</option>
              <option value="COORDENADOR">COORDENADOR</option>
              <option value="PS">PS</option>
              <option value="SUPERVISOR">SUPERVISOR</option>
              <option value="SUPERVISOR TURNO">SUPERVISOR TURNO</option>
              <option value="SUPERVISOR MWH">SUPERVISOR MWH</option>
            </select>
          </div>
          <div>
            <label class="text-[11px] font-black text-gray-400 mb-2 block uppercase">Turno</label>
            <select name="turno" class="input-premium" required>
              <option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option>
              <option value="T4">T4</option><option value="T5">T5</option><option value="T6">T6</option><option value="T7">T7</option>
            </select>
          </div>
          <div>
            <label class="text-[11px] font-black text-orange-600 mb-2 block uppercase">Área de Atuação</label>
            <select name="area_atuacao" id="areaSelect" class="input-premium border-orange-200 bg-orange-50 font-extrabold text-orange-700" required onchange="renderFields()">
                <option value="">SELECIONAR ÁREA</option>
                <option value="INBOUND">INBOUND</option>
                <option value="PICKING LEVE">PICKING LEVE</option>
                <option value="PICKING VOL">PICKING VOL</option>
                <option value="CHECKING LEVE">CHECKING LEVE</option>
                <option value="CHECKING VOL">CHECKING VOL</option>
                <option value="SHIPPING">SHIPPING</option>
                <option value="INVENTARIO">INVENTÁRIO</option>
                <option value="IBT">IBT</option>
                <option value="QUALIDADE">QUALIDADE</option>
                <option value="SUPERVISAO">SUPERVISÃO</option>
            </select>
          </div>
        </div>
      </div>

      <div id="container_areas"></div>

      <div class="card-master">
        <div class="section-title">Conclusão e Evidências</div>
        <textarea name="JUSTIFICATIVA_FINAL" class="input-premium h-32 mb-6 py-4 resize-none" placeholder="Relate aqui os principais desafios, gargalos ou recados para o próximo turno..."></textarea>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button type="button" onclick="document.getElementById('file_final').click()" class="bg-gray-50 p-4 rounded-xl font-bold border-2 border-dashed border-gray-300 text-gray-600 hover:bg-gray-100 transition-all uppercase">📸 ANEXO PASSAGEM DE TURNO</button>
            <button type="button" class="bg-orange-50 text-orange-700 p-4 rounded-xl font-black border-2 border-orange-200 hover:bg-orange-100 transition-all">📥 DESCARREGAR RELATÓRIO</button>
        </div>
        <input type="file" id="file_final" class="hidden" accept="image/*" onchange="handleFileUpload(this, 'final')">
        <input type="hidden" name="FOTO_FINAL" id="data_final">
      </div>

      <button type="button" id="btnEnviar" onclick="enviarDados()" class="btn-send w-full p-6 rounded-2xl flex items-center justify-center gap-4 mb-20">
        <span id="btnText" class="text-lg">Finalizar e Enviar Relatório</span>
        <div id="btnSpinner" class="spinner"></div>
      </button>
    </form>
  </main>

  <div id="success-modal">
    <div class="bg-white p-10 rounded-2xl text-center shadow-2xl max-w-sm">
      <div class="text-6xl mb-4">✅</div>
      <h2 class="text-2xl font-black mb-2">Relatório Salvo!</h2>
      <p class="text-gray-500 mb-6">Passagem de turno enviada com sucesso!</p>
      <button class="bg-orange-600 text-white w-full py-3 rounded-lg font-bold" onclick="location.reload()">NOVO REGISTRO</button>
    </div>
  </div>

  <canvas id="photoCanvas" class="hidden"></canvas>

  <script>
    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
    }, 1000);

    const config = {
      INBOUND: [
        {type: 'sim_nao_just_anexo', label: 'DDS'},
        {type: 'qtd_just_anexo', label: 'RECEBIMENTO'},
        {type: 'qtd_just_anexo', label: 'LH'},
        {type: 'meta_real_perc_anexo', label: 'PUTAWAY'},
        {type: 'qtd_just_anexo', label: 'QTD DE CARROS'},
        {type: 'sim_nao_anexo', label: 'BUFFER PUTAWAY'},
        {type: 'idle_custom', label: 'IDLE TIME'},
        {type: 'qtd_just_anexo', label: 'TRATATIVAS'},
        {type: 'toggle_just', label: 'OPA'}
      ],
      PICKING LEVE: [
        {type: 'sim_nao_just_anexo', label: 'DDS'},
        {type: 'meta_real_perc_anexo', label: 'META DMO'},
        {type: 'qtd_just_anexo', label: 'REIMPRESSÃO DE ENDEREÇO'},
        {type: 'qtd_just_anexo', label: 'FALTAS'},
        {type: 'qtd_just_anexo', label: 'AVARIAS'},
        {type: 'relogio_just_anexo', label: 'ENTREGAS DE COTs'},
        {type: 'idle_custom', label: 'IDLE TIME'},
        {type: 'sim_nao_just_anexo', label: 'OPA'}
      ],
      PICKING VOL: [
        {type: 'sim_nao_just_anexo', label: 'DDS'},
        {type: 'meta_real_perc_anexo', label: 'META DMO'},
        {type: 'qtd_just_anexo', label: 'REIMPRESSÃO DE ENDEREÇO'},
        {type: 'qtd_just_anexo', label: 'FALTAS'},
        {type: 'qtd_just_anexo', label: 'AVARIAS'},
        {type: 'relogio_just_anexo', label: 'ENTREGAS DE COTs'},
        {type: 'idle_custom', label: 'IDLE TIME'},
        {type: 'sim_nao_just_anexo', label: 'OPA'}
      ],
      CHECKING LEVE: [
        {type: 'sim_nao_just_anexo', label: 'DDS'},
        {type: 'meta_real_perc_anexo', label: 'META DMO'},
        {type: 'qtd_just_anexo', label: 'SOBRAS'},
        {type: 'qtd_just_anexo', label: 'FALTA'},
        {type: 'qtd_just_anexo', label: 'AVARIAS'},
        {type: 'relogio_just_anexo', label: 'ENTREGAS DE COTs CHECKING'},
        {type: 'idle_custom', label: 'IDLE TIME'},
        {type: 'sim_nao_just_anexo', label: 'OPA'}
      ],
       CHECKING VOL: [
        {type: 'sim_nao_just_anexo', label: 'DDS'},
        {type: 'meta_real_perc_anexo', label: 'META DMO'},
        {type: 'qtd_just_anexo', label: 'SOBRAS'},
        {type: 'qtd_just_anexo', label: 'FALTA'},
        {type: 'qtd_just_anexo', label: 'AVARIAS'},
        {type: 'relogio_just_anexo', label: 'ENTREGAS DE COTs CHECKING'},
        {type: 'idle_custom', label: 'IDLE TIME'},
        {type: 'sim_nao_just_anexo', label: 'OPA'}
      ],
      SHIPPING: [
        {type: 'sim_nao_just_anexo', label: 'DDS'},
        {type: 'meta_fixa_just_anexo', label: 'SLA TRANSPORTING', fixed: '99%'},
        {type: 'qtd_just_anexo', label: 'PROD. TO PACKING - ESTEIRA (1) PEQ.'},
        {type: 'qtd_just_anexo', label: 'PROD. TO PACKING - ESTEIRA (2) GDE.'},
        {type: 'plano_real_anexo', label: 'PRODUÇÃO GERAL'},
        {type: 'real_just_anexo', label: 'QTD CHECKED', desc: 'Maior que 1 hora'},
        {type: 'qtd_just_anexo', label: 'TOTAL DE HC PRESENTE'},
        {type: 'meta_fixa_just_anexo', label: 'NET', fixed: '80'},
        {type: 'meta_fixa_just_anexo', label: 'ABS', fixed: '15%'},
        {type: 'sim_nao_just_anexo', label: 'OPA'}
      ],
      INVENTARIO: [
        {type: 'qtd_just_anexo', label: 'ESTOQUE ATUAL DE AV'},
        {type: 'qtd_just_anexo', label: 'ESTOQUE ATUAL DE DEM'},
        {type: 'qtd_just_anexo', label: 'ESTOQUE ATUAL GERAL'},
        {type: 'qtd_just_anexo', label: 'TOTAL DE ENDEREÇOS'},
        {type: 'qtd_just_anexo', label: 'ENDEREÇOS BLOQUEADOS'},
        {type: 'qtd_just_anexo', label: 'ENDEREÇOS DESBLOQUEADOS'},
        {type: 'qtd_just_anexo', label: 'ENDEREÇOS OCUPADOS'},
        {type: 'qtd_real_anexo', label: 'ENDEREÇOS CONTADOS'},
        {type: 'qtd_just_anexo', label: 'OB PICKING'},
        {type: 'meta_real_perc_anexo', label: 'META DMO'},
        {type: 'sim_nao_just_anexo', label: 'OPA'}
      ],
      IBT: [
        {type: 'qtd_just_anexo', label: 'PEÇAS TRATADAS NO DIA'},
        {type: 'qtd_just_anexo', label: 'SURPLUS'},
        {type: 'qtd_just_anexo', label: 'SHORTAGES'},
        {type: 'qtd_just_anexo', label: 'IA'},
        {type: 'qtd_just_anexo', label: 'INV'},
        {type: 'qtd_just_anexo', label: 'SKU'},
        {type: 'qtd_just_anexo', label: 'PENDENTES'},
        {type: 'qtd_just_anexo', label: 'MTO'},
        {type: 'qtd_just_anexo', label: 'MTO FAIL'},
        {type: 'qtd_just_anexo', label: 'CHECKED'},
        {type: 'qtd_just_anexo', label: 'PEÇAS AGUARDANDO TRATATIVAS'}
        {type: 'sim_nao_just_anexo', label: 'OPA'}
      ],
      QUALIDADE: [
        {type: 'toggle_just', label: 'DDS'},
        {type: 'qtd_just_anexo', label: 'TREINAMENTO'},
        {type: 'qtd_just_anexo', label: 'SINERGIA'},
        {type: 'qtd_just_anexo', label: 'DDSMA'},
        {type: 'qtd_just_anexo', label: 'MTS APROVADAS'},
        {type: 'qtd_just_anexo', label: 'MTS CANCELADAS'},
        {type: 'qtd_just_anexo', label: 'PENDENTE DE SEPARAÇÃO'},
        {type: 'qtd_just_anexo', label: 'MTS PENDENTE DE APROVAÇÃO'},
        {type: 'qtd_just_anexo', label: 'MANGA PARA REVERSA'},
        {type: 'qtd_just_anexo', label: 'ANÁLISE DE ITENS PARADOS'},
        {type: 'qtd_just_anexo', label: 'TOS'},
        {type: 'qtd_just_anexo', label: 'LH'},
        {type: 'qtd_just_anexo', label: 'PEDIDOOS TRATADOS'},
        {type: 'qtd_just_anexo', label: 'PEDIDOS PENDENTES'},
        {type: 'qtd_just_anexo', label: 'SALVADOS'},
        {type: 'qtd_just_anexo', label: 'AVARIAS'},
        {type: 'qtd_just_anexo', label: 'RR'},
        {type: 'meta_real_perc_anexo', label: 'META DMO'},
        {type: 'sim_nao_just_anexo', label: 'OPA'}
      ],
    };

    function renderFields() {
      const area = document.getElementById('areaSelect').value;
      const container = document.getElementById('container_areas');
      container.innerHTML = "";
      if(!area) return;

      let html = `<div class="card-master"><div class="section-title">Indicadores Operacionais | ${area.replace('_', ' ')}</div>`;

      config[area].forEach((item, idx) => {
        const id = `${area}_${idx}`;
        const prefix = `${area}_${item.label.replace(/\s+/g, '_')}`;

        if (item.type === 'meta_real_perc_anexo') {
          html += `<div class="grid-row-dmo">
            <div class="font-bold text-gray-700 text-sm">${item.label}</div>
            <div><input type="number" id="meta_${id}" name="${prefix}_META" class="input-premium text-center" placeholder="Meta"></div>
            <div><input type="number" id="real_${id}" name="${prefix}_REAL" class="input-premium text-center" placeholder="Real" oninput="calcPerc('${id}')"></div>
            <div><input type="text" id="perc_${id}" name="${prefix}_PERC" class="input-premium bg-gray-100 text-center font-bold text-orange-600" placeholder="%" readonly></div>
            <div class="flex gap-2">
               <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border flex-1 text-[10px] font-bold h-[48px]">ANEXO</button>
               <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
               <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
        else if (item.type === 'sim_nao_anexo') {
          html += `<div class="grid-row-compact">
            <div class="font-bold text-gray-700 text-sm">${item.label}</div>
            <div class="flex gap-1">
              <button type="button" onclick="setToggle(this, '${id}_v', 'SIM')" class="btn-toggle text-xs">SIM</button>
              <button type="button" onclick="setToggle(this, '${id}_v', 'NÃO')" class="btn-toggle text-xs">NÃO</button>
              <input type="hidden" id="${id}_v" name="${prefix}_STATUS">
            </div>
            <div class="flex gap-2">
              <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border flex-1 text-[10px] font-bold h-[48px]">ANEXO</button>
              <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
              <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
        else if (item.type === 'toggle_just') {
          html += `<div class="grid-row-item">
            <div class="font-bold text-gray-700 text-sm">${item.label}</div>
            <div class="flex gap-1">
              <button type="button" onclick="setToggle(this, '${id}_v', 'SIM')" class="btn-toggle text-xs">SIM</button>
              <button type="button" onclick="setToggle(this, '${id}_v', 'NÃO')" class="btn-toggle text-xs">NÃO</button>
              <input type="hidden" id="${id}_v" name="${prefix}_STATUS">
            </div>
            <div class="col-span-2 flex gap-2">
              <input type="text" name="${prefix}_JUST" class="input-premium flex-1" placeholder="Justificativa">
              <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border text-[10px] font-bold">ANEXO</button>
              <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
              <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
        else if (item.type === 'relogio_just_anexo') {
          html += `<div class="grid-row-item">
            <div class="font-bold text-gray-700 text-sm">${item.label}</div>
            <div><input type="time" name="${prefix}_HORA" class="input-premium"></div>
            <div class="col-span-2 flex gap-2">
              <input type="text" name="${prefix}_JUST" class="input-premium flex-1" placeholder="Justificativa">
              <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border text-[10px] font-bold">ANEXO</button>
              <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
              <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
        else if (item.type === 'meta_fixa_just_anexo') {
          html += `<div class="grid-row-item">
            <div class="font-bold text-gray-700 text-sm">${item.label} <span class="block text-[9px] text-orange-500">META: ${item.fixed}</span></div>
            <div><input type="text" name="${prefix}_REAL" class="input-premium" placeholder="Real"></div>
            <div class="col-span-2 flex gap-2">
              <input type="text" name="${prefix}_JUST" class="input-premium flex-1" placeholder="Justificativa">
              <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border text-[10px] font-bold">ANEXO</button>
              <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
              <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
        else if (item.type === 'plano_real_anexo') {
          html += `<div class="grid-row-item">
            <div class="font-bold text-gray-700 text-sm">${item.label}</div>
            <div><input type="number" name="${prefix}_PLANO" class="input-premium" placeholder="Plano"></div>
            <div><input type="number" name="${prefix}_REAL" class="input-premium" placeholder="Real"></div>
            <div class="flex gap-2">
               <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border flex-1 text-[10px] font-bold h-[48px]">ANEXO</button>
               <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
               <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
        else if (item.type === 'idle_custom') {
          html += `<div class="grid-row-idle">
            <div class="font-bold text-gray-700 text-sm">${item.label}</div>
            <div><input type="text" name="${prefix}_IDLE" class="input-premium" placeholder="IDLE"></div>
            <div><input type="number" name="${prefix}_REAL" class="input-premium" placeholder="Real"></div>
            <div><input type="text" name="${prefix}_JUST" class="input-premium" placeholder="Justificativa"></div>
            <div class="flex gap-2">
               <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border flex-1 text-[10px] font-bold">ANEXO</button>
               <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
               <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
        else if (item.type === 'qtd_real_anexo') {
          html += `<div class="grid-row-item">
            <div class="font-bold text-gray-700 text-sm">${item.label}</div>
            <div><input type="number" name="${prefix}_QTD" class="input-premium" placeholder="Quantidade"></div>
            <div><input type="number" name="${prefix}_REAL" class="input-premium" placeholder="Real"></div>
            <div class="flex gap-2">
               <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border flex-1 text-[10px] font-bold">ANEXO</button>
               <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
               <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
        else if (item.type === 'real_just_anexo') {
          html += `<div class="grid-row-item">
            <div class="font-bold text-gray-700 text-sm">${item.label} <span class="block text-[9px] text-gray-400">${item.desc || ''}</span></div>
            <div><input type="number" name="${prefix}_REAL" class="input-premium" placeholder="Real"></div>
            <div class="col-span-2 flex gap-2">
              <input type="text" name="${prefix}_JUST" class="input-premium flex-1" placeholder="Justificativa">
              <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border text-[10px] font-bold">ANEXO</button>
              <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
              <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
        else {
          html += `<div class="grid-row-item">
            <div class="font-bold text-gray-700 text-sm">${item.label}</div>
            <div><input type="number" name="${prefix}_QTD" class="input-premium" placeholder="Qtd"></div>
            <div class="col-span-2 flex gap-2">
              <input type="text" name="${prefix}_JUST" class="input-premium flex-1" placeholder="Justificativa">
              <button type="button" onclick="document.getElementById('file_${id}').click()" class="bg-gray-200 px-3 rounded-lg border text-[10px] font-bold">ANEXO</button>
              <input type="file" id="file_${id}" class="hidden" onchange="handleFileUpload(this, '${id}')">
              <input type="hidden" name="${prefix}_FOTO" id="data_${id}">
            </div>
          </div>`;
        }
      });
      container.innerHTML = html + `</div>`;
    }

    function calcPerc(id) {
      const meta = parseFloat(document.getElementById(`meta_${id}`).value);
      const real = parseFloat(document.getElementById(`real_${id}`).value);
      const percInput = document.getElementById(`perc_${id}`);
      if(meta > 0 && real >= 0) {
        const p = (real / meta) * 100;
        percInput.value = p.toFixed(1) + "%";
      } else { percInput.value = ""; }
    }

    function setToggle(btn, inputId, val) {
      btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active-sim', 'active-nao'));
      btn.classList.add(val === 'SIM' ? 'active-sim' : 'active-nao');
      document.getElementById(inputId).value = val;
    }

    function handleFileUpload(input, id) {
      if (input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const c = document.getElementById('photoCanvas');
            const ctx = c.getContext('2d');
            const scale = 600 / img.width;
            c.width = 600; c.height = img.height * scale;
            ctx.drawImage(img, 0, 0, c.width, c.height);
            document.getElementById(`data_${id}`).value = c.toDataURL('image/jpeg', 0.7);
            alert("✅ Evidência anexada!");
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function enviarDados() {
      const btn = document.getElementById('btnEnviar');
      const spinner = document.getElementById('btnSpinner');
      const text = document.getElementById('btnText');
 
      btn.disabled = true;
      spinner.style.display = 'block';
      text.innerText = "PROCESSANDO...";

      setTimeout(() => {
        document.getElementById('success-modal').style.display = 'flex';
      }, 1500);
    }
  </script>
</body>
</html>
